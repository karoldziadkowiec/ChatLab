services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Your_password123
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    networks:
      - chatlab_net

  coreservice:
    image: ${DOCKERHUB_USERNAME:-chatlab}/chatlab-coreservice:latest
    build:
      context: ./src/Services/CoreService
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8001
      - ConnectionStrings__MSSQLConnectionString=Server=sqlserver;Database=ChatLab;User Id=sa;Password=Your_password123;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JWT__ValidAudience=http://localhost:3000
      - JWT__ValidIssuer=http://localhost:8001
    ports:
      - "8001:8001"
    depends_on:
      - sqlserver
    networks:
      - chatlab_net

  problemservice:
    image: ${DOCKERHUB_USERNAME:-chatlab}/chatlab-problemservice:latest
    build:
      context: ./src/Services/ProblemService
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8002
      - ConnectionStrings__MSSQLConnectionString=Server=sqlserver;Database=ChatLab_Problem;User Id=sa;Password=Your_password123;TrustServerCertificate=True;MultipleActiveResultSets=true
      - JWT__ValidAudience=http://localhost:3000
      - JWT__ValidIssuer=http://localhost:8002
    ports:
      - "8002:8002"
    depends_on:
      - sqlserver
    networks:
      - chatlab_net

  socketio:
    image: ${DOCKERHUB_USERNAME:-chatlab}/chatlab-socketio:latest
    build:
      context: ./src/Services/SocketIoService
    environment:
      - NODE_ENV=production
      - SOCKETIO_PORT=8016
      - GATEWAY_URL=http://gateway:8000
      - WEBCLIENT_ORIGIN=http://localhost:3000
    ports:
      - "8016:8016"
    networks:
      - chatlab_net

  gateway:
    image: ${DOCKERHUB_USERNAME:-chatlab}/chatlab-gateway:latest
    build:
      context: ./src/Gateway
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:8000
      - Gateway__WebClientOrigin=http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - coreservice
      - problemservice
      - socketio
    networks:
      - chatlab_net

  webclient:
    image: ${DOCKERHUB_USERNAME:-chatlab}/chatlab-webclient:latest
    build:
      context: ./src/WebClient
    environment:
      - PORT=3000
    ports:
      - "3000:3000"
    networks:
      - chatlab_net

networks:
  chatlab_net:
    driver: bridge

volumes:
  mssql-data:
