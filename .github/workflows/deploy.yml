name: Build, Test and Publish Images

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCKERHUB_USERNAME: ${{ github.event_name == 'pull_request' && 'chatlab' || secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build

      - name: Push Docker images
        if: github.event_name != 'pull_request'
        run: docker compose -f docker-compose.yml push coreservice problemservice socketio gateway webclient

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: Your_password123
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_password123 -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 20s

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore .NET projects
        run: dotnet restore ChatLab.sln

      - name: Run integration tests
        env:
          TEST_SQLSERVER_CONNSTR: Server=localhost,1433;User Id=sa;Password=Your_password123;TrustServerCertificate=True;MultipleActiveResultSets=true
        run: dotnet test ChatLab.sln --configuration Release --no-restore
