syntax = "proto3";

package chatlab.grpc;

import "google/protobuf/timestamp.proto";

service ChatGrpc {
  rpc SendMessage (MessageSend) returns (Message);
  rpc StreamChat (StreamRequest) returns (stream Message);
}

message StreamRequest {
  int32 chatId = 1;
  string userId = 2;
  int32 sinceMessageId = 3; // optional: start streaming after this id
}

message MessageSend {
  int32 chatId = 1;
  string senderId = 2;
  string receiverId = 3;
  int32 communicationTechnologyId = 4;
  string content = 5;
}

message Message {
  int32 id = 1;
  int32 chatId = 2;
  string senderId = 3;
  string receiverId = 4;
  string content = 5;
  google.protobuf.Timestamp timestamp = 6;
  string technologyName = 7;
}
